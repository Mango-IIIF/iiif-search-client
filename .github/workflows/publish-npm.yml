name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out tag
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must use the vX.Y.Z format" >&2; exit 1 ;;
          esac

          PACKAGE_VERSION=$(node --print "require('./package.json').version")
          TAG_VERSION=${RELEASE_TAG#v}

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Test package
        run: npm test

      - name: Publish package
        run: npm publish
